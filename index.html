<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>Jelvan Ricolcol | AI Engineer • HR Technology • Full-Stack Developer</title>

    <meta
      name="description"
      content="Official portfolio of Jelvan Ricolcol, an AI Engineer, HR Technology Specialist, and Full-Stack Developer specializing in artificial intelligence, digital transformation, intelligent automation, modern web development, and people-focused technology."
    />

    <meta
      name="keywords"
      content="Jelvan Ricolcol, AI Engineer, Artificial Intelligence, HR Technology, Human Resources, Full Stack Developer, React, TypeScript, Cloudflare Workers, Digital Transformation, Automation, Portfolio"
    />

    <meta name="author" content="Jelvan Ricolcol" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <!-- Canonical -->
    <link
      rel="canonical"
      href="https://portfolio.jelvan.pro"
    />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
    />

    <!-- Theme -->
    <meta
      name="theme-color"
      content="#0B0F19"
    />

    <meta
      name="color-scheme"
      content="dark light"
    />

    <!-- Open Graph -->
    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:site_name"
      content="Jelvan Portfolio"
    />

    <meta
      property="og:title"
      content="Jelvan Ricolcol | AI Engineer • HR Technology • Full-Stack Developer"
    />

    <meta
      property="og:description"
      content="Explore the professional portfolio of Jelvan Ricolcol featuring AI engineering, HR technology, intelligent automation, digital transformation, and modern web development."
    />

    <meta
      property="og:url"
      content="https://portfolio.jelvan.pro"
    />

    <meta
      property="og:image"
      content="https://portfolio.jelvan.pro/og-image.png"
    />

    <meta
      property="og:locale"
      content="en_US"
    />

    <!-- Twitter -->
    <meta
      name="twitter:card"
      content="summary_large_image"
    />

    <meta
      name="twitter:title"
      content="Jelvan Ricolcol | AI Engineer"
    />

    <meta
      name="twitter:description"
      content="AI Engineering • HR Technology • Digital Transformation • Full-Stack Development"
    />

    <meta
      name="twitter:image"
      content="https://portfolio.jelvan.pro/og-image.png"
    />

    <!-- Mobile -->
    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <meta
      name="apple-mobile-web-app-title"
      content="Jelvan Portfolio"
    />

    <!-- Manifest -->
    <link
      rel="manifest"
      href="/manifest.json"
    />

    <!-- Performance -->
    <link
      rel="preconnect"
      href="https://res.cloudinary.com"
    />

    <link
      rel="preconnect"
      href="https://player.cloudinary.com"
    />

    <!-- Cloudinary Player -->
    <link
      rel="stylesheet"
      href="https://player.cloudinary.com/v1.13.3/cld-video-player.min.css"
    />

    <script
      defer
      src="https://player.cloudinary.com/v1.13.3/cld-video-player.min.js"
    ></script>
  </head>

  <body>
    <noscript>
      This website requires JavaScript to display the portfolio experience.
    </noscript>

    <div id="root"></div>

    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
